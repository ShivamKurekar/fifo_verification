<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, Helvetica, sans-serif">
  <title>sync_fifo UVM testbench architecture</title>
  <desc>Compact grayscale block diagram of the sync_fifo UVM testbench: tb_top instantiates clk, sync_fifo DUT and fifo_intf; fifo_env contains an agent (sequencer, driver, monitor), a scoreboard and a coverage collector.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2C2C2A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#FFFFFF"/>

  <!-- ============ tb_top container ============ -->
  <rect x="15" y="15" width="870" height="440" rx="14" fill="none" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="35" y="38" font-size="14" font-weight="700" fill="#000000">tb_top (tb_top.sv)</text>

  <!-- ============ Row 1 : clk / fifo_intf / DUT ============ -->

  <!-- clk -->
  <rect x="40" y="55" width="130" height="85" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="105" y="83"  font-size="13" font-weight="700" text-anchor="middle" fill="#2C2C2A">clk</text>
  <text x="105" y="103" font-size="11" text-anchor="middle" fill="#2C2C2A">generator</text>
  <text x="105" y="121" font-size="11" text-anchor="middle" fill="#2C2C2A">20 ns period</text>

  <!-- fifo_intf -->
  <rect x="200" y="55" width="380" height="85" rx="6" fill="#D3D1C7" stroke="#444441" stroke-width="1"/>
  <text x="390" y="83"  font-size="13" font-weight="700" text-anchor="middle" fill="#000000">fifo_intf.sv</text>
  <text x="390" y="103" font-size="11" text-anchor="middle" fill="#2C2C2A">clocking block (single clock domain)</text>
  <text x="390" y="121" font-size="11" text-anchor="middle" fill="#2C2C2A">SVA + cover properties bound in-line</text>

  <!-- DUT -->
  <rect x="610" y="55" width="250" height="85" rx="6" fill="#B4B2A9" stroke="#000000" stroke-width="1.5"/>
  <text x="735" y="83"  font-size="13" font-weight="700" text-anchor="middle" fill="#000000">sync_fifo (DUT)</text>
  <text x="735" y="103" font-size="11" text-anchor="middle" fill="#1a1a1a">DEPTH=16  DATA_WIDTH=8</text>
  <text x="735" y="121" font-size="11" text-anchor="middle" fill="#1a1a1a">ALMOST_EMPTY=2  ALMOST_FULL=14</text>

  <!-- clk -> fifo_intf -->
  <line x1="170" y1="97" x2="200" y2="97" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- fifo_intf <-> DUT -->
  <line x1="580" y1="90"  x2="610" y2="90"  stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="610" y1="106" x2="580" y2="106" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ============ fifo_env container ============ -->
  <rect x="30" y="160" width="840" height="280" rx="12" fill="#FAFAF8" stroke="#5F5E5A" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="50" y="183" font-size="13" font-weight="700" fill="#000000">fifo_env</text>

  <!-- agent container -->
  <rect x="180" y="200" width="420" height="210" rx="10" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="200" y="222" font-size="12" font-weight="700" fill="#444441">agent</text>

  <!-- driver -->
  <rect x="210" y="245" width="160" height="55" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="290" y="270" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">fifo_driver</text>
  <text x="290" y="288" font-size="10" text-anchor="middle" fill="#444441">drives din/read/write</text>

  <!-- monitor -->
  <rect x="410" y="245" width="160" height="55" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="490" y="270" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">fifo_monitor</text>
  <text x="490" y="288" font-size="10" text-anchor="middle" fill="#444441">samples every clk</text>

  <!-- sequencer -->
  <rect x="210" y="335" width="160" height="55" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="290" y="360" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">fifo_sequencer</text>
  <text x="290" y="378" font-size="10" text-anchor="middle" fill="#444441">test sequence library</text>

  <!-- sequencer -> driver -->
  <line x1="290" y1="335" x2="290" y2="300" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- driver -> fifo_intf -->
  <line x1="290" y1="245" x2="290" y2="140" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- fifo_intf -> monitor -->
  <line x1="490" y1="140" x2="490" y2="245" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- scoreboard -->
  <rect x="630" y="245" width="210" height="55" rx="6" fill="#5F5E5A" stroke="#000000" stroke-width="1"/>
  <text x="735" y="270" font-size="12" font-weight="700" text-anchor="middle" fill="#FFFFFF">fifo_scoreboard</text>
  <text x="735" y="288" font-size="10" text-anchor="middle" fill="#E8E7E3">exp_q reference queue</text>

  <!-- coverage -->
  <rect x="630" y="335" width="210" height="55" rx="6" fill="#5F5E5A" stroke="#000000" stroke-width="1"/>
  <text x="735" y="360" font-size="12" font-weight="700" text-anchor="middle" fill="#FFFFFF">fifo_coverage</text>
  <text x="735" y="378" font-size="10" text-anchor="middle" fill="#E8E7E3">uvm_subscriber covergroup</text>

  <!-- monitor -> scoreboard -->
  <line x1="570" y1="272.5" x2="630" y2="272.5" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- monitor -> coverage (L-shaped) -->
  <path d="M490 300 L490 362.5 L630 362.5" fill="none" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- legend -->
  <g>
    <rect x="40"  y="465" width="16" height="12" rx="3" fill="#B4B2A9" stroke="#000000"/>
    <text x="64"  y="475" font-size="10" fill="#2C2C2A">DUT / interface</text>
    <rect x="230" y="465" width="16" height="12" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/>
    <text x="254" y="475" font-size="10" fill="#2C2C2A">agent (stimulus/observation)</text>
    <rect x="460" y="465" width="16" height="12" rx="3" fill="#5F5E5A" stroke="#000000"/>
    <text x="484" y="475" font-size="10" fill="#2C2C2A">checking (scoreboard/coverage)</text>
  </g>
</svg>
